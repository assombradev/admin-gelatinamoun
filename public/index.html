<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Gelatina Mounjaro</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">ADMIN PANEL</div>
      <h1 class="login-title">Bem-vindo de volta</h1>
      <p class="login-sub">Acesse o painel de controle do funil</p>
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <input type="text" class="form-input" id="username" placeholder="admin" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••">
      </div>
      <div id="login-error" style="display:none;color:#e05555;font-size:12px;margin-bottom:12px;font-family:'DM Mono',monospace"></div>
      <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
